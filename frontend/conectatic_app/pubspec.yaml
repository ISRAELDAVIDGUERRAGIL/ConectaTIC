# ============================================
# ARCHIVO: pubspec.yaml
# PROPÓSITO: Configuración de la aplicación Flutter
# DESCRIPCIÓN: Define metadatos, dependencias y assets del proyecto
# ============================================

# Nombre del proyecto
name: conectatic_app

# Descripción breve del proyecto
description: "A new Flutter project."

# Prevenir publicar el paquete en pub.dev (porque es privado)
publish_to: 'none'

# ============ VERSIÓN ============
# Formato: versión+número_build (ej: 1.2.43+123)
# Android usa: versionName (1.2.43) y versionCode (123)
# iOS usa: CFBundleShortVersionString (1.2.43) y CFBundleVersion (123)
version: 1.0.0+1

# ============ ENTORNO ============
# Versión mínima de SDK requerida para ejecutar este proyecto
environment:
  sdk: ^3.5.3

# ============ DEPENDENCIAS ============
# Librerías externas que usa la aplicación
dependencies:
  # Flutter SDK (el framework base de Flutter)
  flutter:
    sdk: flutter
  
  # Paquete 'http': para hacer solicitudes HTTP al servidor backend
  # Versión: 1.2.0 o superior
  # Uso: Conectar con la API (registro, login, obtener datos)
  http: ^1.2.0

  # Paquete 'shared_preferences': para guardar datos localmente
  # Uso: Guardar token de autenticación y datos del usuario
  shared_preferences: ^2.0.0

  # Paquete 'provider': manejar estado global de la aplicación
  provider: ^6.0.5

  # Paquete 'go_router': navegación declarativa y rutas modernas
  go_router: ^10.0.0

  # Paquete 'google_fonts': tipografía moderna y profesional
  google_fonts: ^5.0.0

  # Paquete 'flutter_animate': animaciones suaves y modernas
  flutter_animate: ^4.0.0

  # Paquete 'video_player': reproducir videos locales
  video_player: ^2.8.0

  # Paquete 'url_launcher': abrir URLs externas
  url_launcher: ^6.2.0

  # Paquete 'cupertino_icons': iconos estilo iOS (Apple)
  # Proporciona iconos modernos para la interfaz
  cupertino_icons: ^1.0.8

# ============ DEPENDENCIAS DE DESARROLLO ============
# Se usan solo durante el desarrollo, no en la app final
dev_dependencies:
  # flutter_test: para escribir y ejecutar tests (pruebas)
  flutter_test:
    sdk: flutter

  # flutter_lints: reglas de análisis de código (buenas prácticas)
  # Ayuda a escribir código de mejor calidad
  flutter_lints: ^4.0.0

# ============ ASSETS (Recursos de la aplicación) ============
# flutter:
#   uses-material-design: true
#   
#   # Imágenes, fuentes, y otros archivos
#   assets:
#     - assets/images/
#     - assets/fonts/

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/videos/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
